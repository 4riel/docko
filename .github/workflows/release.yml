name: Release

# Manual, gated publish to npm with build provenance. Bump versions first
# (pnpm version:set <version>), merge to main, then run this workflow.
#
# Requires an NPM_TOKEN repository secret: a granular access token with
# "Bypass 2FA" enabled and write access to docko-workspace.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        default: alpha
        type: string

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:verify
      - run: npm publish .publish/npm --tag "${{ inputs.tag }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
